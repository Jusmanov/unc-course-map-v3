<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carolina Course Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --blue: #4B9CD3;
      --navy: #13294B;
      --navy2: #0d1c33;
      --cream: #F5F0E8;
      --ink: #1C1C1E;
      --muted: #7a7570;
      --gold: #C8963E;
      --glass: rgba(240, 236, 228, 0.94);
      --green: #3a7d44;
      --red: #b5432a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Instrument Sans', sans-serif; background: var(--navy2); }

    /* MAP */
    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
    .leaflet-container { background: var(--navy2) !important; }
    .leaflet-tile { filter: brightness(0.78) saturate(0.5) hue-rotate(195deg); }
    .leaflet-control-zoom a {
      background: rgba(13,28,51,0.92) !important;
      color: var(--cream) !important;
      border-color: rgba(75,156,211,0.25) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--blue) !important; color: var(--navy) !important; }
    .leaflet-control-attribution {
      background: rgba(13,28,51,0.6) !important;
      color: rgba(245,240,232,0.3) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: rgba(75,156,211,0.5) !important; }

    /* HEADER */
    #hdr {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 54px;
      z-index: 900;
      background: rgba(13,28,51,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(75,156,211,0.14);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    #hdr .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    #hdr h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--cream);
      letter-spacing: -0.01em;
    }
    #hdr .sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--blue);
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }
    #hdr .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      padding: 3px 9px;
      border-radius: 2px;
      border: 1px solid rgba(75,156,211,0.22);
      color: rgba(245,240,232,0.4);
      letter-spacing: 0.08em;
    }

    /* SEARCH */
    #search-wrap {
      position: fixed;
      top: 64px;
      left: 14px;
      z-index: 800;
      width: 260px;
    }
    #search-wrap svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.4;
    }
    #search {
      width: 100%;
      padding: 8px 12px 8px 32px;
      background: rgba(13,28,51,0.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(75,156,211,0.22);
      border-radius: 4px;
      color: var(--cream);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: rgba(245,240,232,0.28); }
    #search:focus { border-color: var(--blue); }

    /* EMPTY HINT */
    #hint {
      position: fixed;
      top: 54px; left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      gap: 6px;
    }
    #hint p {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(245,240,232,0.18);
    }
    #hint span {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.08);
    }

    /* SIDEBAR */
    #sidebar {
      position: fixed;
      top: 54px; right: 0; bottom: 0;
      width: 370px;
      z-index: 800;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(75,156,211,0.12);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #sidebar.open { transform: translateX(0); }

    #sb-close {
      position: absolute;
      top: 13px; right: 14px;
      width: 26px; height: 26px;
      border: none;
      background: rgba(19,41,75,0.1);
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      z-index: 2;
    }
    #sb-close:hover { background: rgba(19,41,75,0.2); }

    #sb-head {
      padding: 20px 20px 14px;
      border-bottom: 1px solid rgba(19,41,75,0.08);
      flex-shrink: 0;
    }
    #sb-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 5px;
    }
    #sb-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--navy);
      line-height: 1.15;
      padding-right: 30px;
    }
    #sb-meta {
      margin-top: 7px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .meta-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      padding: 2px 7px;
      border-radius: 2px;
      background: rgba(19,41,75,0.07);
      color: var(--muted);
    }

    /* PROF LIST */
    #prof-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #prof-list::-webkit-scrollbar { width: 3px; }
    #prof-list::-webkit-scrollbar-thumb { background: rgba(19,41,75,0.12); border-radius: 2px; }

    .prof-card {
      padding: 13px 20px;
      border-bottom: 1px solid rgba(19,41,75,0.06);
      transition: background 0.1s;
      cursor: default;
    }
    .prof-card:hover { background: rgba(75,156,211,0.05); }

    .prof-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .prof-dept {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    .big-rating {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      line-height: 1;
      min-width: 44px;
    }
    .rating-bars { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .bar-row { display: flex; align-items: center; gap: 6px; }
    .bar-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      width: 62px;
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      height: 3px;
      background: rgba(19,41,75,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .bar-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      min-width: 24px;
      text-align: right;
    }

    .wta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }
    .wta-pct {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
    }
    .wta-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
    }
    .num-ratings {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: rgba(19,41,75,0.28);
      margin-left: auto;
    }

    .rmp-link {
      display: inline-block;
      margin-top: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--blue);
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    .rmp-link:hover { text-decoration: underline; }

    .no-rating {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      padding: 18px 20px;
      text-align: center;
    }

    /* LOADING STATE */
    .loading-state {
      padding: 40px 20px;
      text-align: center;
    }
    .loading-dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }
    .loading-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .loading-txt {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 10px;
      text-transform: uppercase;
    }

    /* LEGEND */
    #legend {
      position: fixed;
      bottom: 20px;
      left: 14px;
      z-index: 800;
      background: rgba(13,28,51,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(75,156,211,0.14);
      border-radius: 4px;
      padding: 10px 14px;
    }
    .leg-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.3);
      margin-bottom: 7px;
    }
    .leg-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }
    .leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .leg-row span {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem;
      color: rgba(245,240,232,0.5);
    }

    /* TOOLTIP */
    .btt {
      background: rgba(13,28,51,0.95) !important;
      border: 1px solid rgba(75,156,211,0.28) !important;
      border-radius: 4px !important;
      padding: 7px 11px !important;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4) !important;
    }
    .btt::before { display: none !important; }
    .btt-name {
      font-family: 'DM Serif Display', serif;
      font-size: 0.85rem;
      color: #F5F0E8;
    }
    .btt-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem;
      color: #4B9CD3;
      margin-top: 2px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<!-- Header -->
<header id="hdr">
  <div class="brand">
    <h1>Carolina Course Intelligence</h1>
    <span class="sub">UNC Chapel Hill</span>
  </div>
  <div class="badge">Live · RateMyProfessors</div>
</header>

<!-- Search -->
<div id="search-wrap">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#F5F0E8" stroke-width="2.5">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
  </svg>
  <input id="search" type="text" placeholder="Search building or department…" />
</div>

<!-- Map -->
<div id="map"></div>

<!-- Empty hint -->
<div id="hint">
  <p>Click any building to see professor ratings</p>
  <span>Live data from RateMyProfessors</span>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <button id="sb-close">✕</button>
  <div id="sb-head">
    <div id="sb-tag">Department</div>
    <h2 id="sb-name">—</h2>
    <div id="sb-meta"></div>
  </div>
  <div id="prof-list"></div>
</div>

<!-- Legend -->
<div id="legend">
  <div class="leg-title">Prof Rating</div>
  <div class="leg-row"><div class="leg-dot" style="background:#3a7d44"></div><span>4.0 – 5.0  Excellent</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#4B9CD3"></div><span>3.0 – 3.9  Good</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#C8963E"></div><span>2.0 – 2.9  Mixed</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:#b5432a"></div><span>Below 2.0  Poor</span></div>
  <div class="leg-row"><div class="leg-dot" style="background:rgba(75,156,211,0.4)"></div><span>No ratings yet</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
// ─── BUILDINGS DATA ────────────────────────────────────────────────────────
// Each building has the professors / department search terms we'll query RMP for
const BUILDINGS = [
  { id: "sitterson",  name: "Sitterson Hall",           tag: "Computer Science",              lat: 35.910178, lng: -79.053398, dept: "Computer Science",       subjects: ["COMP"], yearBuilt: 1971 },
  { id: "phillips",   name: "Phillips Hall",             tag: "Mathematics & Statistics",      lat: 35.912502, lng: -79.050765, dept: "Mathematics",            subjects: ["MATH","STOR"], yearBuilt: 1919 },
  { id: "gardner",    name: "Gardner Hall",              tag: "Economics & Political Science", lat: 35.910723, lng: -79.050198, dept: "Economics",              subjects: ["ECON","POLI"], yearBuilt: 1915 },
  { id: "hamilton",   name: "Hamilton Hall",             tag: "English & Comp Literature",     lat: 35.912005, lng: -79.051822, dept: "English",                subjects: ["ENGL"], yearBuilt: 1952 },
  { id: "davie",      name: "Davie Hall",                tag: "Psychology",                    lat: 35.909832, lng: -79.049215, dept: "Psychology",             subjects: ["PSYC"], yearBuilt: 1964 },
  { id: "murphey",    name: "Murphey Hall",              tag: "History & Religious Studies",   lat: 35.911420, lng: -79.049850, dept: "History",                subjects: ["HIST"], yearBuilt: 1923 },
  { id: "carroll",    name: "Carroll Hall",              tag: "Media & Journalism",            lat: 35.909300, lng: -79.048200, dept: "Journalism",             subjects: ["MEJO"], yearBuilt: 1957 },
  { id: "genome",     name: "Genome Sciences Building",  tag: "Biology & Genetics",            lat: 35.906534, lng: -79.055640, dept: "Biology",                subjects: ["BIOL"], yearBuilt: 2008 },
  { id: "caudill",    name: "Caudill Labs",              tag: "Chemistry & Biochemistry",      lat: 35.910900, lng: -79.054200, dept: "Chemistry",              subjects: ["CHEM"], yearBuilt: 1968 },
  { id: "mitchell",   name: "Mitchell Hall",             tag: "Sociology & Anthropology",      lat: 35.912800, lng: -79.049100, dept: "Sociology",              subjects: ["SOCI"], yearBuilt: 1922 },
  { id: "kenan",      name: "Kenan-Flagler Business",    tag: "Business School",               lat: 35.904410, lng: -79.051940, dept: "Business",               subjects: ["BUSI"], yearBuilt: 1997 },
  { id: "greenlaw",   name: "Greenlaw Hall",             tag: "Languages & Linguistics",       lat: 35.912700, lng: -79.050500, dept: "Linguistics",            subjects: ["LING","FREN","SPAN"], yearBuilt: 1968 },
  { id: "hanes",      name: "Hanes Art Center",          tag: "Art & Art History",             lat: 35.910600, lng: -79.047500, dept: "Art",                    subjects: ["ARTH","ARTV"], yearBuilt: 1984 },
  { id: "wilson",     name: "Wilson Library",            tag: "Information & Library Science", lat: 35.911500, lng: -79.052900, dept: "Information Science",    subjects: ["INLS"], yearBuilt: 1929 },
  { id: "fetzer",     name: "Fetzer Hall",               tag: "Exercise & Sport Science",      lat: 35.907800, lng: -79.046500, dept: "Exercise and Sport Science", subjects: ["EXSS"], yearBuilt: 1938 },
];

// UNC Chapel Hill RMP school ID
const UNC_SCHOOL_ID = "U2Nob29sLTEyMzI=";
// RMP is proxied via /api/rmp

// Cache so we don't re-fetch
const rmpCache = {};

// ─── RMP FETCH ─────────────────────────────────────────────────────────────
async function fetchProfsByDept(dept) {
  if (rmpCache[dept]) return rmpCache[dept];
  try {
    const res = await fetch("/api/rmp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dept }),
    });
    if (!res.ok) throw new Error(`proxy ${res.status}`);
    const data = await res.json();
    const profs = data.profs ?? [];
    rmpCache[dept] = profs;
    return profs;
  } catch (err) {
    console.warn("RMP fetch failed:", err);
    rmpCache[dept] = [];
    return [];
  }
}

// ─── COLOR HELPERS ─────────────────────────────────────────────────────────
function ratingColor(r) {
  if (!r || r === 0) return "rgba(75,156,211,0.45)";
  if (r >= 4.0) return "#3a7d44";
  if (r >= 3.0) return "#4B9CD3";
  if (r >= 2.0) return "#C8963E";
  return "#b5432a";
}

function ratingText(r) {
  if (!r || r === 0) return "rgba(245,240,232,0.4)";
  if (r >= 4.0) return "#3a7d44";
  if (r >= 3.0) return "#4B9CD3";
  if (r >= 2.0) return "#C8963E";
  return "#b5432a";
}

function diffColor(d) {
  if (!d) return "#aaa";
  if (d >= 4.0) return "#b5432a";
  if (d >= 3.0) return "#C8963E";
  return "#3a7d44";
}

// ─── RENDER SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar(building, profs) {
  document.getElementById("sb-tag").textContent = building.tag;
  document.getElementById("sb-name").textContent = building.name;

  const meta = document.getElementById("sb-meta");
  meta.innerHTML = `
    ${building.yearBuilt ? `<span class="meta-chip">Est. ${building.yearBuilt}</span>` : ""}
    <span class="meta-chip">${building.subjects.join(" · ")}</span>
    <span class="meta-chip">${profs.length} prof${profs.length !== 1 ? "s" : ""} rated</span>
  `;

  const list = document.getElementById("prof-list");

  if (profs.length === 0) {
    list.innerHTML = `<div class="no-rating">No RateMyProfessors data found<br><br>
      <a href="https://www.ratemyprofessors.com/search/professors/1232?q=${encodeURIComponent(building.dept)}"
         target="_blank" rel="noopener" style="color:var(--blue);font-family:'DM Mono',monospace;font-size:0.6rem;">
        Search on RMP ↗
      </a></div>`;
    return;
  }

  list.innerHTML = profs.map(p => {
    const rating = p.avgRating || 0;
    const diff = p.avgDifficulty || 0;
    const wta = p.wouldTakeAgainPercent;
    const wtaDisplay = wta >= 0 ? Math.round(wta) + "%" : "N/A";
    const wtaColor = wta >= 70 ? "var(--green)" : wta >= 50 ? "var(--gold)" : wta >= 0 ? "var(--red)" : "var(--muted)";
    const rmpUrl = `https://www.ratemyprofessors.com/professor/${p.legacyId || p.id}`;

    return `
      <div class="prof-card">
        <div class="prof-name">${p.firstName} ${p.lastName}</div>
        <div class="prof-dept">${p.department || building.dept}</div>

        <div class="rating-row">
          <div class="big-rating" style="color:${ratingText(rating)}">${rating.toFixed(1)}</div>
          <div class="rating-bars">
            <div class="bar-row">
              <span class="bar-lbl">Quality</span>
              <div class="bar-track">
                <div class="bar-fill" style="width:${(rating/5)*100}%;background:${ratingColor(rating)}"></div>
              </div>
              <span class="bar-val">${rating.toFixed(1)}</span>
            </div>
            <div class="bar-row">
              <span class="bar-lbl">Difficulty</span>
              <div class="bar-track">
                <div class="bar-fill" style="width:${(diff/5)*100}%;background:${diffColor(diff)}"></div>
              </div>
              <span class="bar-val">${diff.toFixed(1)}</span>
            </div>
          </div>
        </div>

        <div class="wta-row">
          <span class="wta-pct" style="color:${wtaColor}">${wtaDisplay}</span>
          <span class="wta-lbl">would take again</span>
          <span class="num-ratings">${p.numRatings} rating${p.numRatings !== 1 ? "s" : ""}</span>
        </div>

        <a class="rmp-link" href="${rmpUrl}" target="_blank" rel="noopener">
          View on RateMyProfessors ↗
        </a>
      </div>
    `;
  }).join("");
}

// ─── LOADING STATE ─────────────────────────────────────────────────────────
function showLoading(building) {
  document.getElementById("sb-tag").textContent = building.tag;
  document.getElementById("sb-name").textContent = building.name;
  document.getElementById("sb-meta").innerHTML = "";
  document.getElementById("prof-list").innerHTML = `
    <div class="loading-state">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="loading-txt">Fetching professor ratings…</div>
    </div>
  `;
}

// ─── MAP INIT ──────────────────────────────────────────────────────────────
const map = L.map("map", {
  center: [35.9095, -79.0510],
  zoom: 16,
  zoomControl: true,
});

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

const markers = {};
let activeBuilding = null;

// Render markers
BUILDINGS.forEach(b => {
  const marker = L.circleMarker([b.lat, b.lng], {
    radius: 11,
    fillColor: "rgba(75,156,211,0.5)",
    color: "rgba(255,255,255,0.5)",
    weight: 2,
    fillOpacity: 0.9,
  }).addTo(map);

  marker.bindTooltip(
    `<div class="btt-name">${b.name}</div><div class="btt-sub">${b.tag}</div>`,
    { className: "btt", direction: "top", offset: [0, -8] }
  );

  marker.on("click", async () => {
    activeBuilding = b;

    // Hide empty hint
    document.getElementById("hint").style.display = "none";

    // Open sidebar with loading state
    showLoading(b);
    document.getElementById("sidebar").classList.add("open");

    // Fetch RMP data
    const profs = await fetchProfsByDept(b.dept);

    // Update marker color based on avg rating
    if (profs.length > 0) {
      const avg = profs.reduce((s, p) => s + (p.avgRating || 0), 0) / profs.length;
      marker.setStyle({ fillColor: ratingColor(avg), fillOpacity: 0.92 });
    }

    // Render
    if (activeBuilding?.id === b.id) {
      renderSidebar(b, profs);
    }
  });

  markers[b.id] = { marker, building: b };
});

// Close sidebar
document.getElementById("sb-close").addEventListener("click", () => {
  document.getElementById("sidebar").classList.remove("open");
  activeBuilding = null;
});

// Search
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  Object.values(markers).forEach(({ marker, building }) => {
    const match =
      building.name.toLowerCase().includes(q) ||
      building.tag.toLowerCase().includes(q) ||
      building.dept.toLowerCase().includes(q) ||
      building.subjects.some(s => s.toLowerCase().includes(q));

    marker.setStyle({ opacity: match || !q ? 1 : 0.15, fillOpacity: match || !q ? 0.9 : 0.1 });
  });
});

// Pre-fetch all buildings in background after 2s so clicks feel instant
setTimeout(() => {
  BUILDINGS.forEach(b => fetchProfsByDept(b.dept));
}, 2000);

}); // end DOMContentLoaded
</script>
</body>
</html>
